<header class="navbar bg-base-100 border-b border-slate-200 px-4 md:px-8 h-16 sticky top-0 z-50 shadow-sm">
  <!-- Left Side: Hamburger (Mobile Only) & Brand Logo -->
  <div class="flex-none lg:hidden">
    <label for="app-drawer" class="btn btn-square btn-ghost">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" class="inline-block w-6 h-6 stroke-current"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
    </label>
  </div>
  <div class="flex-1 flex items-center gap-3 px-2">
    <div class="w-8 h-8 rounded-full bg-primary flex items-center justify-center shadow-md">
      <svg class="w-4 h-4 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="8" width="18" height="12" rx="2"/><path d="M12 8V3m0 0a3 3 0 1 1 3 3 3 3 0 0 1-6 0 3 3 0 0 1 3-3z"/></svg>
    </div>
    <span class="font-bold text-2xl text-primary tracking-tight">GiftHub</span>
  </div>
  
  <!-- Center: Desktop Menu (Hidden on Mobile) -->
  <div class="flex-none hidden lg:flex">
    <ul class="menu menu-horizontal px-1 gap-4 font-medium text-slate-600">
      <li><a class="text-primary border-b-2 border-primary rounded-none bg-transparent py-5 px-3 hover:bg-transparent hover:text-primary">Grupos</a></li>
      <li><a class="border-b-2 border-transparent hover:border-primary hover:text-primary rounded-none bg-transparent py-5 px-3 transition-all">Descobrir</a></li>
      <li><a class="border-b-2 border-transparent hover:border-primary hover:text-primary rounded-none bg-transparent py-5 px-3 transition-all">Favoritos</a></li>
    </ul>
  </div>
  
  <!-- Right Side: Search & Avatar -->
  <div class="flex-none gap-2 ml-auto">
    <button class="btn btn-ghost btn-circle">
      <svg class="w-5 h-5 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
    </button>
    <div class="avatar pl-2">
      <div class="w-8 h-8 rounded-full ring ring-primary ring-offset-base-100 ring-offset-2 overflow-hidden bg-slate-200">
      </div>
    </div>
  </div>
</header>
