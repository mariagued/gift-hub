<div class="flex h-screen w-full bg-slate-50 text-slate-800 font-sans">
  
  <!-- Sidebar Desktop -->
  @if (showLayout) {
  <aside class="hidden md:flex flex-col w-64 bg-white border-r border-slate-200 shadow-sm">
    <div class="p-6">
      <h1 class="text-2xl font-bold tracking-tight text-purple-700">GiftHub</h1>
    </div>
    
    <nav class="flex-1 px-4 space-y-2 mt-4">
      <a routerLink="/dashboard" routerLinkActive="bg-purple-50 text-purple-700 font-semibold" 
         class="flex items-center gap-3 px-4 py-3 rounded-2xl text-slate-600 hover:bg-slate-50 transition-colors">
        <!-- Ícone Home -->
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
        </svg>
        Home
      </a>
      
      <a routerLink="/groups" routerLinkActive="bg-purple-50 text-purple-700 font-semibold"
         class="flex items-center gap-3 px-4 py-3 rounded-2xl text-slate-600 hover:bg-slate-50 transition-colors">
        <!-- Ícone Grupos -->
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
        </svg>
        Meus Grupos
      </a>
      
      <a routerLink="/profile" routerLinkActive="bg-purple-50 text-purple-700 font-semibold"
         class="flex items-center gap-3 px-4 py-3 rounded-2xl text-slate-600 hover:bg-slate-50 transition-colors">
        <!-- Ícone Perfil -->
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
        </svg>
        Perfil
      </a>
    </nav>
  </aside>
  }

  <!-- Conteúdo Principal -->
  <main class="flex-1 overflow-y-auto pb-20 md:pb-0">
    <!-- Topbar Mobile (Apenas Título) -->
    @if (showLayout) {
    <header class="md:hidden bg-white px-4 py-4 border-b border-slate-200 shadow-sm flex items-center justify-center sticky top-0 z-10">
      <h1 class="text-xl font-bold tracking-tight text-purple-700">GiftHub</h1>
    </header>
    }
    
    <div class="max-w-screen-xl mx-auto p-4 md:p-8">
      <router-outlet />
    </div>
  </main>

  <!-- Bottom Navigation Mobile -->
  @if (showLayout) {
  <nav class="md:hidden fixed bottom-0 left-0 w-full bg-white border-t border-slate-200 shadow-lg z-20 flex justify-around p-2">
    <a routerLink="/dashboard" routerLinkActive="text-purple-700 font-semibold" class="flex flex-col items-center p-2 text-slate-500 w-full text-xs transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
      </svg>
      Home
    </a>
    <a routerLink="/groups" routerLinkActive="text-purple-700 font-semibold" class="flex flex-col items-center p-2 w-full text-slate-500 text-xs transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
      </svg>
      Grupos
    </a>
    <a routerLink="/profile" routerLinkActive="text-purple-700 font-semibold" class="flex flex-col items-center p-2 w-full text-slate-500 text-xs transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
      </svg>
      Perfil
    </a>
  </nav>
  }

</div>
