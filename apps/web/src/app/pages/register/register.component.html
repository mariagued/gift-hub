<div class="hero min-h-[calc(100vh-100px)]">
  <div class="hero-content flex-col w-full max-w-md">
    <div class="text-center mb-2">
      <h1 class="text-4xl font-bold text-slate-800 tracking-tight">Criar conta</h1>
      <p class="py-2 text-slate-500">Junte-se ao Gift Hub hoje</p>
    </div>
    <div class="card w-full shadow-xl bg-base-100 border border-slate-100">
      <form class="card-body" (submit)="onRegister($event)">
        <div class="flex flex-col gap-1 w-full">
          <label class="text-sm font-medium text-slate-700 ml-1">Nome completo</label>
          <input type="text" placeholder="John Doe" class="input input-bordered w-full focus:border-primary focus:ring-1 focus:ring-primary transition-all" required />
        </div>
        <div class="flex flex-col gap-1 w-full mt-2">
          <label class="text-sm font-medium text-slate-700 ml-1">Email</label>
          <input type="email" placeholder="you@example.com" class="input input-bordered w-full focus:border-primary focus:ring-1 focus:ring-primary transition-all" required />
        </div>
        <div class="flex flex-col gap-1 w-full mt-2">
          <label class="text-sm font-medium text-slate-700 ml-1">Senha</label>
          <input type="password" placeholder="••••••••" class="input input-bordered w-full focus:border-primary focus:ring-1 focus:ring-primary transition-all" required />
        </div>
        <div class="mt-6">
          <button type="submit" class="btn w-full text-white shadow-md hover:shadow-lg transition-shadow bg-gradient-to-r from-[#630ed4] to-[#7c3aed] border-none">Criar Conta</button>
        </div>
        <div class="divider text-slate-400 text-sm my-4">Já tem uma conta?</div>
        <div class="text-center">
          <a routerLink="/login" class="btn btn-outline btn-block text-[#630ed4] border-[#630ed4] hover:text-white hover:bg-gradient-to-r hover:from-[#630ed4] hover:to-[#7c3aed] hover:border-transparent">Faça login</a>
        </div>
      </form>
    </div>
  </div>
</div>
